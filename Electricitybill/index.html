<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Electricity Bill Calculator</title>
<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Smart Electricity Bill Calculator</h1>

<div class="card">

<div class="row">

<!-- LEFT SIDE : Appliance Inputs -->

<div class="inputs">

<h3>Appliance Usage</h3>

<label>Fan (75W) - Hours</label>
<input type="number" id="fan" value="0">

<label>TV (120W) - Hours</label>
<input type="number" id="tv" value="0">

<label>AC (1500W) - Hours</label>
<input type="number" id="ac" value="0">

<label>Light (20W) - Hours</label>
<input type="number" id="light" value="0">

<button onclick="calculateBill()">Calculate</button>

</div>


<!-- RIGHT SIDE : Graph -->

<div class="graph">

<h3>Electricity Usage Graph</h3>
<canvas id="usageChart"></canvas>

</div>

</div>

<!-- TOTAL BILL -->

<div class="total">
<p id="result"></p>
</div>

</div>

<!-- History -->

<div class="card">

<h3>Bill History</h3>
<ul id="history"></ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
